<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot - Vercel Ready</title>
    <script src="https://cdn.jsdelivr.net/npm/@google/generative-ai"></script>
    <style>
        /* Same styles as before */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .chat-container {
            max-width: 800px;
            margin: auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
        }
        .message {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 5px;
            word-wrap: break-word;
        }
        .user-message {
            background-color: #e3f2fd;
            text-align: right;
        }
        .ai-message {
            background-color: #f5f5f5;
        }
        .chat-input-area {
            display: flex;
            padding: 20px;
            border-top: 1px solid #eee;
        }
        #userInput {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        #sendBtn {
            margin-left: 10px;
            padding: 10px 20px;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #sendBtn:disabled {
            background-color: #ccc;
        }
        .loading {
            color: #2196F3;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off">
            <button id="sendBtn">Send</button>
        </div>
    </div>

    <script>
        // Vercel-friendly implementation
        const API_KEY = 'AIzaSyAk7dSQfqfHlVo9nO6rzcG10pzXgxnNHys';

        // Check for API key in URL parameters first (Vercel env vars)
        const urlParams = new URLSearchParams(window.location.search);
        const vercelApiKey = urlParams.get('apiKey');
        if (vercelApiKey) {
            localStorage.setItem('api_key', vercelApiKey);
            window.history.replaceState({}, '', window.location.pathname);
        }

        // Load API key from localStorage or fallback to hardcoded key
        const apiKey = localStorage.getItem('api_key') || API_KEY;
        
        // Initialize Gemini API
        const genAI = new google.ai.generativelanguage.GenerativeModel({
            model: 'gemini-pro',
            apiKey: apiKey
        });

        // DOM elements
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // Conversation history
        let history = [];

        // Function to add messages to chat
        function addMessage(text, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
            messageDiv.textContent = text;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight; // Auto-scroll
        }

        // Function to handle sending messages
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Add user message
            addMessage(message, true);
            userInput.value = '';
            sendBtn.disabled = true;

            try {
                // Create history including previous messages
                const fullHistory = [...history, {role: 'user', parts: [{text: message}]}];
                
                // Generate response
                const result = await genAI.generateContent(fullHistory);
                const responseText = result.response.text();
                
                // Add AI response
                addMessage(responseText);
                history.push({role: 'user', parts: [{text: message}]});
                history.push({role: 'model', parts: [{text: responseText}]});
            } catch (error) {
                addMessage(`Error: ${error.message || 'Failed to get response'}`);
            } finally {
                sendBtn.disabled = false;
            }
        }

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });

        // Initial welcome message
        addMessage("Hello! How can I assist you today?");
    </script>
</body>
</html>
